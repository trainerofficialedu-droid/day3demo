name: Day3 Pipeline

on:
  push:

jobs:

  test:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest flake8

      - name: Run Linter
        run: |
          flake8 .

      - name: Run Tests
        run: |
          pytest

      - name: Execute Pipeline
        run: |
          python main.py
